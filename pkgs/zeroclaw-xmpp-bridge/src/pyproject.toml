[project]
name = "zeroclaw-xmpp-bridge"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "slixmpp>=1.8",
    "slixmpp-omemo>=1.0",
    "aiohttp>=3.9",
]

[project.scripts]
zeroclaw-xmpp-bridge = "bridge:main"

[tool.setuptools]
py-modules = ["bridge"]

[build-system]
requires = ["setuptools>=68"]
